version: "3.9"

services:
  # --- Django -------------------------------------------------
  django-web:
    build: .
    container_name: django-docker
    restart: unless-stopped
    volumes:
      - ./static:/app/staticfiles
      - ./media:/app/media

      # ✅ Monta tu SQLite existente (ajusta el nombre/ruta si aplica)
      - ./db.sqlite3:/app/db.sqlite3

      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env.prod

  # --- Nginx reverso -----------------------------------------
  frontend-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
    depends_on:
      - django-web

